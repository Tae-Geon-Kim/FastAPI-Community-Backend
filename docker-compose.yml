services:
  app:
    build: .
    container_name: fastapi-app-container
    environment:
      TZ: Asia/Seoul
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    container_name: postgres-db-container
    environment:
      TZ: Asia/Seoul
      POSTGRES_USER: cutshion
      POSTGRES_PASSWORD: cutshion@
      POSTGRES_DB: CommunityBackendDB
    command: -c timezone=Asia/Seoul
    ports:
      - "15432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    container_name: nginx-proxy-container
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf 
    depends_on:
      - app
  
  redis:
    image: redis:latest
    container_name: redis-cache-container
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: /bin/sh -c 'redis-server --requirepass "$${REDIS_PASSWORD}"'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}