name: Cutshion Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # --------------------------------------------------
  # 1. TEST 단계 (CI)
  # --------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: Test_CommunityBackendDB
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 세팅 (3.12)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 테스트용 DB 테이블 뼈대 구축 (schemas.sql 실행)
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          psql -h localhost -U ${{ secrets.DB_USER }} -d Test_CommunityBackendDB -f schemas.sql

      - name: Pytest 실행
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: CommunityBackendDB
          DB_MAX_SIZE: 10
          DB_MIN_SIZE: 5

          UPLOAD_DIR: upload
          FILE_MAX_SIZE: 5242880
          FILE_TOTAL_MAX_SIZE: 26214400

          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: "trash_value"

          SECRET_KEY: ${{ secrets.TOKEN_SECRET_KEY }}
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 30

          LOGGING_DIR: logs
          FILE_NAME: server.log
          WHEN: midnight
          INTERVAL: 1
          BACKUP: 7

          FORMAT: "%(asctime)s %(levelname)s %(message)s"
          DATEFMT: "%m/%d/%Y %I:%M:%S %p"

        run: |
          pytest 

  # --------------------------------------------------
  # 2. DEPLOY 단계 (CD)
  # --------------------------------------------------
  deploy:
    needs: test
    runs-on: self-hosted 
    timeout-minutes: 10
    steps:
      - name: 사내 서버 내부에서 직접 배포 실행
        run: |
          cd ~/community_backend
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          docker compose up -d --build